<div class="dark">
  <div class="app-root">

    <div class="spinner-overlay" [class.spinner-overlay--visible]="spinnerService.isLoading()">
      <div class="spinner">
        <mat-spinner [diameter]="50" mode="indeterminate"></mat-spinner>
      </div>
    </div>

    @if (layoutService.sidebarVisible()) {
    <aside id="default-sidebar"
      class="fixed top-0 left-0 z-40 noScrollBar overflow-y-auto md:translate-x-0 w-52 h-screen transition-transform"
      [class.-translate-x-full]="!layoutService.sidebarOpen()"
      [class.translate-x-0]="layoutService.sidebarOpen()"
      aria-label="Sidebar">
      <app-sidebar></app-sidebar>
    </aside>
    @if (layoutService.sidebarOpen()) {
    <div class="fixed inset-0 z-30 bg-black/50 md:hidden" aria-hidden="true" (click)="layoutService.closeSidebar()"></div>
    }
    }

    @if (showBlur()) {
      <div id="main-content-bg-image"></div>
    }
    <div id="mainContent" class="mainContent {{headerVisibleClass}} overflow-y-auto noScrollBar w-full pl-0 md:pl-52 ">
        <router-outlet></router-outlet>
    </div>
  </div>
</div>

@if (layoutService.footerVisible()) {
<renderer-footer class="z-1000"></renderer-footer>
}
@if (layoutService.footerVisible() && showBlur()) {
<div class="bg-img-footer z-1000" id="footer-background"></div>
}
