<div class="panel border-0 rounded-xl" (mouseleave)="close()">
  <div class="border-0 border-b-1 text-lg font-bold border-zinc-600 p-4">Media Server</div>
  <div class="dialogItems flex flex-col flex-wrap mt-4 minWidth">
    @for (device of filteredMediaServerList(); track device.udn) {
      <div class="element-item {{getSelectedClass(device.udn)}}"
        (click)="selectServer(device.udn)">
        <div class="renderer-icon-slot">
          @if (device.img?.length > 0) {
            <img class="renderer-icon" src="{{device.img}}" alt="{{device.friendlyName}}">
          } @else {
            <div class="renderer-icon-placeholder"></div>
          }
        </div>
        <div class="renderer-name" title="{{device.friendlyName}}">{{device.friendlyName}}</div>
      </div>
    }
  </div>
</div>
