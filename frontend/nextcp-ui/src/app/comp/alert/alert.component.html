<div [class]="alertClass()" role="alert">
    <svg class="shrink-0 inline w-4 h-4 me-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" [attr.viewBox]="iconViewBox()">
        <path [attr.d]="iconPath()"/>
    </svg>
    
    <!-- Screen Reader information-->
    <span class="sr-only">{{screenReader()}}</span>
    
    <span class="font-medium">{{prefix()}}</span> 
    
    <div class="ms-4 font-light">{{text()}}</div>
    
</div>
