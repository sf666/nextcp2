# Spring AI MCP server configuration.
#
# Exposes the @Tool-annotated control-point services (McpDevices, McpLocale, ...)
# as an MCP server over the Streamable-HTTP transport so that external MCP
# gateways/hosts (e.g. obot) can connect to nextCP/2 as a remote MCP server.
#
# The server is served by the same Spring MVC web layer as the REST/SSE API and
# the static Angular app, i.e. on the regular application port (default 8085).
spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.name=nextcp2
spring.ai.mcp.server.version=1.0.0

# Streamable-HTTP endpoint path. Remote clients (obot) connect to
#   http://<host>:8085/mcp
spring.ai.mcp.server.streamable-http.mcp-endpoint=/mcp
