# Spring AI MCP server configuration.
#
# Exposes the @Tool-annotated control-point services (McpDevices, McpLocale, ...)
# as an MCP server over the Streamable-HTTP transport so that external MCP
# gateways/hosts (e.g. obot) can connect to nextCP/2 as a remote MCP server.
#
# The server is served by the same Spring MVC web layer as the REST/SSE API and
# the static Angular app, i.e. on the regular application port (default 8085).
spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.name=nextcp2
spring.ai.mcp.server.version=1.0.0

# Streamable-HTTP endpoint path. Remote clients (obot) connect to
#   http://<host>:8085/mcp
spring.ai.mcp.server.streamable-http.mcp-endpoint=/mcp

# Disable all Spring AI model auto-configurations.
#
# The chat model (Google Gemini or any OpenAI-compatible endpoint such as
# OpenWebUI) is created programmatically in nextcp.config.SpringAiConfig from the
# nextcp2Config.json AiConfig - NOT from spring.ai.* properties. The model
# starters (google-genai, openai) otherwise eagerly auto-configure clients for
# every modality (chat, embedding, image, audio speech/transcription, moderation)
# with matchIfMissing=true. Those eager beans fail at startup with
# "At least one credential source must be specified" because no spring.ai.openai
# api-key property is set. Setting each modality to "none" disables them.
spring.ai.model.chat=none
spring.ai.model.embedding=none
spring.ai.model.image=none
spring.ai.model.audio.speech=none
spring.ai.model.audio.transcription=none
spring.ai.model.moderation=none
