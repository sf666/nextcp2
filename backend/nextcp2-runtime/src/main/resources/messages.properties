# MCP Tool Messages (English)
mcp.device.renderer.select.noSelection.response = No media player was selected. Please select a media player first.
mcp.device.renderer.select.notFound.response = No device with the name {0} was found any more.
mcp.device.renderer.select.response = {0} was selected as the active device. All further player commands will apply to this device.
mcp.device.server.select.noSelection.response = No Media Server was selected. Please select a Media Server first.
mcp.device.server.select.notFound.response = No device with the name {0} was found any more.
mcp.device.server.select.response = {0} was selected as the active Media Server. All further server commands will apply to this device.

# MCP Locale Messages
mcp.locale.selected.response = The currently selected language is {0}.
mcp.locale.selected.noSelection.response = No language has been explicitly selected. The default language is EN (English).
mcp.locale.select.response = The system language has been set to {0}. All further responses will be in this language.
mcp.locale.select.notFound.response = The language ''{0}'' is not supported. Available languages are: EN, DE.
