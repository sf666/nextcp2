# AI provider errors
mcp.ai.budgetExceeded.response = The AI budget has been exhausted. No further requests can be processed at the moment. Please try again later or check your billing details.
mcp.ai.modelUnavailable.response = The AI model is temporarily unavailable due to high demand. This is usually short-lived - please try again in a few moments.
mcp.ai.unreachable.response = The AI service could not be reached. Please check that the AI server is running and that the base URL in the AI settings is correct.
# Posted into the chat when the active AI provider/model was switched. {0} = provider, {1} = model.
mcp.ai.providerChanged.notice = AI provider switched to {0} (model: {1}).
