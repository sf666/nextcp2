# tolgee.yaml project config
projectId: 31950
format: PROPERTIES_JAVA

push:
  # Explicitly map the base file without language suffixes to English (en)
  files:
    - path: "./backend/nextcp2-runtime/src/main/resources/messages.properties"
      language: en

pull:
  # The base directory where Tolgee will save the pulled translation files
  path: "./backend/nextcp2-runtime/src/main/resources"
  languages: [en, de]
  # The file naming template relative to the pull path
  filesTemplate: "messages_{languageTag}.properties"

