name: Build native packages

# Builds self-contained native packages of nextCP/2 (a bundled Java runtime is
# included, so end users need no JVM). jpackage cannot cross-compile, hence the
# per-OS matrix: each runner builds the package for its own platform.
#
#   * Push a tag  v*  (e.g. v4.4.1)  -> builds every platform and attaches the
#     installers + portable app-image zips to a GitHub Release.
#   * Run manually (workflow_dispatch) -> builds every platform and uploads the
#     results as downloadable workflow artifacts (no release).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # required to create the GitHub Release and upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 26

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      # WiX Toolset v3 is required by jpackage to build the Windows .msi installer.
      # (The portable app-image needs no external tooling.) The windows-latest image
      # already ships WiX 3.14, so install without a version pin - choco treats an
      # existing install as success, and continue-on-error keeps a toolchain hiccup
      # from failing the job (the .msi step is best-effort anyway).
      - name: Ensure WiX Toolset (Windows)
        if: runner.os == 'Windows'
        continue-on-error: true
        run: choco install wixtoolset -y --no-progress
        shell: pwsh

      # nextCP/2 depends on custom forks (ik666/jupnp, sf666/musicbrainz) that are
      # not on Maven Central and must be built into the local repository first.
      - name: Build local dependencies (jupnp, musicbrainz)
        run: bash build_dependencies.sh
        shell: bash

      # The Angular build writes into backend/.../resources/static, which is then
      # packaged into the Spring Boot jar - so it must run before the backend build.
      - name: Build frontend
        working-directory: frontend/nextcp-ui
        run: |
          yarn install
          yarn build
        shell: bash

      - name: Build backend (Spring Boot fat jar)
        working-directory: backend
        run: mvn -B -DskipTests install
        shell: bash

      # Portable app-image: always built, needs no OS packaging tooling.
      - name: Build native app-image
        run: bash package/build-native.sh app-image
        shell: bash

      # Native installer (.dmg on macOS, .msi on Windows): best-effort so a
      # missing/misbehaving installer toolchain does not lose the app-image above.
      - name: Build native installer
        continue-on-error: true
        run: bash package/build-native.sh installer
        shell: bash

      - name: Zip portable app-image (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent "build/native/app-image/nextCP2.app" "build/native/nextCP2-macos.zip"
        shell: bash

      - name: Zip portable app-image (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path "build/native/app-image/nextCP2" -DestinationPath "build/native/nextCP2-windows.zip"
        shell: pwsh

      # The runnable fat jar and the MA9000 device driver are platform-independent
      # and already built by the 'mvn install' step above. Stage them from a single
      # runner (macOS) so they are published exactly once, not once per OS.
      - name: Stage platform-independent jars (macOS only)
        if: runner.os == 'macOS'
        run: |
          cp backend/nextcp2-assembly/target/nextcp2.jar build/native/nextcp2.jar
          cp backend/nextcp2-device-driver/nextcp2-ma9000/target/device_driver_ma9000.jar build/native/nextcp2-ma9000.jar
        shell: bash

      # Separate artifacts per format so each download stays small (the installer and the
      # portable app image each bundle a full JRE, and the jars are platform-independent).
      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: nextCP2-${{ runner.os }}-installer
          if-no-files-found: warn # installer build is best-effort (see the .msi/.dmg step)
          path: |
            build/native/*.dmg
            build/native/*.msi

      - name: Upload portable app-image artifact
        uses: actions/upload-artifact@v7
        with:
          name: nextCP2-${{ runner.os }}-appimage
          if-no-files-found: error
          path: build/native/*.zip

      - name: Upload jars artifact (once, from macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: nextcp2-jars
          if-no-files-found: error
          path: build/native/*.jar

      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          # Per-tag notes: release-notes/<tag>.md (e.g. release-notes/v4.4.1.md).
          # Missing file -> only the auto-generated commit list is used (warning, no failure).
          body_path: release-notes/${{ github.ref_name }}.md
          generate_release_notes: true
          files: |
            build/native/*.dmg
            build/native/*.msi
            build/native/*.zip
            build/native/*.jar

  # Linux Docker image, built once on ubuntu and pushed to the GitHub Container
  # Registry (ghcr.io/<owner>/<repo>). Uses the same build steps as the native
  # jobs, then copies the built jars into a JRE image via the repo Dockerfile.
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 26

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build local dependencies (jupnp, musicbrainz)
        run: bash build_dependencies.sh

      - name: Build frontend
        working-directory: frontend/nextcp-ui
        run: |
          yarn install
          yarn build

      - name: Build backend (jars for the image)
        working-directory: backend
        run: mvn -B -DskipTests install

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # On a version tag this yields both the version (e.g. 4.4.2) and 'latest'
      # (metadata-action's default flavor:latest=auto tags the newest semver as
      # latest). A plain branch/dispatch run gets a branch/sha tag and is not
      # published (push is gated on a tag below).
      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
