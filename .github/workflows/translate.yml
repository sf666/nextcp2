name: Sync Translations with Tolgee

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tolgee-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Wichtig: Vollständiger Checkout für git-auto-commit
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Tolgee CLI
        run: npm install -g @tolgee/cli

      # 1. Push neue englische Keys zu Tolgee Cloud
      - name: Push new Keys to Tolgee
        run: tolgee push --api-key ${{ secrets.TOLGEE_API_KEY }} --config ./tolgee.yaml --force-mode keep --verbose

      # 2. Pull aktuelle Übersetzungen von Tolgee Cloud
      - name: Pull Translations from Tolgee
        run: tolgee pull --api-key ${{ secrets.TOLGEE_API_KEY }} --config ./tolgee.yaml --verbose

      # Debug: Zeige was sich geändert hat
      - name: Show changed files
        run: |
          echo "=== Git Status ==="
          git status
          echo "=== Changed translation files ==="
          find ./backend/nextcp2-runtime/src/main/resources -name "messages_*.properties" -exec echo "Found: {}" \;
          echo "=== Content of messages_de.properties ==="
          cat ./backend/nextcp2-runtime/src/main/resources/messages_de.properties || echo "File not found!"

      # 3. Commit und Push der aktualisierten Übersetzungen
      - name: Commit & Push updated translations
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(i18n): update translations from Tolgee [skip ci]"
          file_pattern: "backend/nextcp2-runtime/src/main/resources/messages_*.properties"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
