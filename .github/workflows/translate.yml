name: Sync Translations with Tolgee

on:
  push:
    branches: [ main ] # Runs the workflow on every push to the 'main' branch

# Force GitHub runner to use Node 24 for JavaScript actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tolgee-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Updated to modern Node 24

      - name: Install Tolgee CLI
        run: npm install -g @tolgee/cli

      # 1. Push new English keys from Spring Boot to Tolgee Cloud
      - name: Push new Keys to Tolgee
        run: tolgee push --api-key ${{ secrets.TOLGEE_API_KEY }} --config ./tolgee.yaml --verbose

      # 2. Pull the latest translations (e.g. German) from Tolgee Cloud
      - name: Pull Translations from Tolgee
        run: tolgee pull --api-key ${{ secrets.TOLGEE_API_KEY }} --config ./tolgee.yaml --verbose

      # 3. Automatically commit and push updated .properties files back to the repository
      - name: Commit & Push updated translations
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(i18n): update translations from Tolgee [skip ci]"
          file_pattern: "backend/nextcp2-runtime/src/main/resources/messages_*.properties"

